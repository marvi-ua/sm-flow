  #     context: ./agents/script_agent
  #   container_name: autoflow_script_agent
  #   env_file: .env
  #   ports:
  #     - "8002:8000"
  #   restart: unless-stopped
  #   networks:
  #     - autoflow_net

  # ── EDITING AGENT (Block 7) ───────────────────────────────────
