  #   env_file: .env
  #   ports:
  #     - "8003:8000"
  #   restart: unless-stopped
  #   networks:
  #     - autoflow_net

  # ── QUALITY GATE AGENT (Block 8) ──────────────────────────────
  # quality_gate_agent:
  #   build:
  #     context: ./agents/quality_gate_agent
  #   container_name: autoflow_quality_gate_agent
  #   env_file: .env
  #   ports:
  #     - "8004:8000"
  #   restart: unless-stopped
  #   networks:
  #     - autoflow_net

  # ── POSTING AGENT (Block 9) ───────────────────────────────────
  # posting_agent:
  #   build:
  #     context: ./agents/posting_agent
  #   container_name: autoflow_posting_agent
  #   env_file: .env
  #   ports:
