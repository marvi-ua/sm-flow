version: "3.9"

# ─────────────────────────────────────────────────────────────────
# AutoFlow Social — docker-compose.yml
# 6-agent collapsed architecture.
# Uncomment each service as its Dockerfile is built.
# Port map:
#   8001 → trend_agent
#   8002 → script_agent
#   8003 → editing_agent
#   8004 → quality_gate_agent
#   8005 → posting_agent
#   8006 → analytics_agent (post-MVP)
#   5678 → n8n
# ─────────────────────────────────────────────────────────────────

services:

  # ── TREND AGENT (Block 5) ─────────────────────────────────────
  trend_agent:
    build:
      context: ./agents/trend_agent
      dockerfile: Dockerfile
    container_name: autoflow_trend_agent
    env_file: .env
    ports:
      - "8001:8000"
    volumes:
      - ./data/logs:/app/logs
    restart: unless-stopped
    networks:
      - autoflow_net

  # ── SCRIPT AGENT (Block 6) ────────────────────────────────────
  # script_agent:
