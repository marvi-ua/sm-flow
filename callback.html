<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authorization — Flowcast</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0f1e;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #111827;
      border: 1px solid #1e2d4a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 40px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 15px;
      color: #8a93aa;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      color: #4f8ef7;
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid #1e2d4a;
      padding-bottom: 2px;
    }
    a:hover { border-color: #4f8ef7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Authorization successful</h1>
    <p>Your account has been connected to Flowcast. You may close this window and return to the application.</p>
    <a href="index.html">← Return to Flowcast</a>
  </div>
</body>
</html>
